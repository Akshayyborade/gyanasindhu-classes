name: Update Sitemap Date

on:
  push:
    branches: [main]

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update lastmod date in sitemap
        run: |
          TODAY=$(date +%Y-%m-%d)
          sed -i "s|<lastmod>.*</lastmod>|<lastmod>$TODAY</lastmod>|g" sitemap.xml
          # Add lastmod if not present
          if ! grep -q "<lastmod>" sitemap.xml; then
            sed -i "s|<priority>|<lastmod>$TODAY</lastmod>\n    <priority>|g" sitemap.xml
          fi

      - name: Commit updated sitemap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "Auto-update sitemap date: $(date +%Y-%m-%d)"
          git push
